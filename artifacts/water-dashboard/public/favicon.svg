<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="dropGrad" x1="16" y1="8" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="22" y1="18" x2="30" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <clipPath id="dropClip">
      <path d="M32 6 C32 6 10 30 10 42 C10 53.05 20.06 62 32 62 C43.94 62 54 53.05 54 42 C54 30 32 6 32 6 Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

  <!-- Drop shape -->
  <path d="M32 6 C32 6 10 30 10 42 C10 53.05 20.06 62 32 62 C43.94 62 54 53.05 54 42 C54 30 32 6 32 6 Z"
        fill="url(#dropGrad)" opacity="0.95"/>

  <!-- Water fill inside drop -->
  <rect x="10" y="47" width="44" height="15" fill="#0369a1" opacity="0.55" clip-path="url(#dropClip)"/>

  <!-- Wave inside drop -->
  <path d="M10 47 Q18 43 26 47 Q34 51 42 47 Q50 43 54 47 L54 62 L10 62 Z"
        fill="#0ea5e9" opacity="0.45" clip-path="url(#dropClip)"/>

  <!-- Circuit lines inside drop -->
  <g clip-path="url(#dropClip)" stroke="#bae6fd" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
    <line x1="20" y1="36" x2="44" y2="36"/>
    <line x1="20" y1="36" x2="20" y2="28"/>
    <line x1="44" y1="36" x2="44" y2="28"/>
    <line x1="20" y1="28" x2="30" y2="28"/>
    <line x1="34" y1="28" x2="44" y2="28"/>
    <line x1="32" y1="36" x2="32" y2="43"/>
  </g>

  <!-- Circuit nodes -->
  <g clip-path="url(#dropClip)" fill="#7dd3fc" opacity="0.9">
    <circle cx="20" cy="28" r="2.2"/>
    <circle cx="44" cy="28" r="2.2"/>
    <circle cx="32" cy="43" r="2.5"/>
    <circle cx="32" cy="36" r="1.8"/>
    <circle cx="20" cy="36" r="1.6"/>
    <circle cx="44" cy="36" r="1.6"/>
  </g>

  <!-- WiFi signal arcs -->
  <g clip-path="url(#dropClip)" stroke="#e0f7fa" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M26 22 Q32 17 38 22" stroke-width="1.6"/>
    <path d="M23 19 Q32 12 41 19" stroke-width="1.3" opacity="0.55"/>
  </g>

  <!-- Shine highlight -->
  <path d="M22 22 Q24 16 29 18 Q26 24 22 22 Z" fill="url(#shineGrad)" opacity="0.8"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
